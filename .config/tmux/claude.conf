# ── nested tmux · tabbed Claude sessions inside the ide sidebar ──
# Launched by ~/.local/bin/claude-tabs on its OWN tmux server (-L ide-claude)
# so it never collides with the outer ide session. Each tab (window) is an
# independent Claude instance.

# Distinct prefix: C-a, so it never clashes with the outer ide prefix (C-s).
# (Only active while focus is in the sidebar pane.) C-a C-a -> last tab.
set -g prefix C-a
unbind C-b
bind C-a send-prefix
bind C-a last-window

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on            # click a tab in the strip to switch
set -sg escape-time 10

# tab management
bind c new-window claude   # C-a c -> new Claude tab
bind C new-window          # C-a C -> new plain shell tab
# C-a n / C-a p / C-a 1..9 switch tabs; C-a , renames; C-a & closes (built-ins)

# ── status bar = the tab strip, on top, soft catppuccin-ish colors ──
set -g status-position top
set -g status-style "bg=default,fg=colour147"
set -g status-left "#[fg=colour218,bold] ✦ #[fg=colour238]│ "
set -g status-right ""
set -g status-left-length 10
setw -g window-status-format "#[fg=colour244] #I #W "
setw -g window-status-current-format "#[fg=colour218,bold] #I #W "
setw -g window-status-separator ""
set -g message-style "fg=colour218,bg=default"
