# ── tmux config · catppuccin-ish ──

# true color + 256 color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# prefix: C-s instead of C-b
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# start counting at 1, renumber when one closes
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# mouse on, longer history, faster escape (matters for vim)
set -g mouse on
set -g history-limit 10000
set -sg escape-time 10

# splits that make sense: | vertical, - horizontal
# open new panes/windows in the current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# C-s C-q -> cut the current pane into quarters (2x2 grid): top-left,
# top-right, bottom-left, bottom-right. New panes open in the current path;
# cursor lands in the top-left. (Run it on a single-pane window for clean 1/4s.)
bind C-q \
  split-window -h -c "#{pane_current_path}" \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-pane -L \; \
  split-window -v -c "#{pane_current_path}" \; \
  select-pane -U

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# reload config
bind r source-file ~/.tmux.conf \; display "reloaded ♡"

# ── colors ──
# 147 lavender · 151 mint · 117 sky · 183 mauve · 218 pink · 216 peach

# pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour147"

# status bar: minimal, bottom, soft colors
set -g status-position bottom
set -g status-style "bg=default,fg=colour147"
set -g status-left "#[fg=colour218,bold] #S #[fg=colour238]│ "
set -g status-right "#[fg=colour151]%H:%M #[fg=colour238]│ #[fg=colour183]%a %b %d "
set -g status-left-length 40
set -g status-right-length 60

# window list
setw -g window-status-format "#[fg=colour244] #I #W "
setw -g window-status-current-format "#[fg=colour218,bold] #I #W "
setw -g window-status-separator ""

# messages (the little popup when you reload, etc)
set -g message-style "fg=colour218,bg=default"

# ── VSCode-style IDE panels (see ~/.local/bin/ide) ──
# C-s b -> toggle left sidebar (claude) · C-s t -> toggle bottom terminal
# note: C-s t overrides the default clock-mode binding
bind b run-shell "$HOME/.local/bin/tmux-toggle-pane sidebar"
bind t run-shell "$HOME/.local/bin/tmux-toggle-pane panel"
# lazygit is launched from inside nvim (<leader>gg) so its edit ('e') can open
# files back in that nvim; no tmux popup binding (a bare popup has no parent nvim).
# C-s Q -> close the whole IDE session (with confirmation)
bind Q confirm-before -p "close this session? (y/n) " kill-session
